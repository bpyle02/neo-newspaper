<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Neo News</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=UnifrakturMaguntia&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --ink: #1a1a1a;
            --paper: #f4ebd0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #c8c0a8;
            color: var(--ink);
            font-family: 'PT Serif', Georgia, serif;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .newspaper-container {
            width: 100%;
            max-width: 1200px;
            background: var(--paper);
            padding: 20px 28px 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            border-bottom: 5px double var(--ink);
            margin-bottom: 14px;
            padding-bottom: 8px;
        }
        .masthead {
            font-family: 'UnifrakturMaguntia', cursive, serif;
            font-size: clamp(2.8rem, 7vw, 4.8rem);
            line-height: 1;
        }
        .tagline {
            font-family: 'PT Serif', serif;
            font-style: italic;
            font-size: 0.82rem;
            margin: 6px 0 4px;
        }
        .meta-bar {
            border-top: 2px solid var(--ink);
            border-bottom: 1px solid var(--ink);
            padding: 3px 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ── CSS COLUMN FLOW ── */
        .front-page-columns {
            column-count: 1;
            column-gap: 0;
            column-rule: 1px solid var(--ink);
        }
        @media (min-width: 600px)  { .front-page-columns { column-count: 2; } }
        @media (min-width: 900px)  { .front-page-columns { column-count: 3; } }

        /* ── STANDARD SECTION ── */
        .news-section {
            break-inside: avoid-column;
            border-top: 2px solid var(--ink);
            padding: 10px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ── FULL-WIDTH SECTIONS (US + Science & Tech) ── */
        .section-fullwidth {
            column-span: all;
            border-top: 3px solid var(--ink);
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            padding: 10px 0 16px;
        }
        @media (min-width: 700px) {
            .section-fullwidth {
                grid-template-columns: 1.6fr 1fr;
                align-items: start;
            }
            .section-fullwidth .section-banner {
                grid-column: 1 / -1;
            }
            .section-fullwidth .minor-stories-container {
                border-top: none;
                border-left: 1px solid var(--ink);
                padding: 0 0 0 14px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
        }

        /* ── SECTION BANNER ── */
        .section-banner {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(1.15rem, 2.4vw, 1.85rem);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            border-bottom: 1px solid var(--ink);
            padding-bottom: 4px;
            margin-bottom: 4px;
        }

        /* ── LEAD STORY ── */
        .story-lead h3 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.15rem, 2.4vw, 1.85rem);
            font-weight: 900;
            line-height: 1.1;
            margin: 6px 0 5px;
        }
        .lead-summary {
            font-size: 0.88rem;
            line-height: 1.55;
            text-align: justify;
            hyphens: auto;
        }
        .drop-cap {
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            float: left;
            line-height: 1;
            padding-right: 5px;
            padding-top: 3px;
        }

        /* ── MINOR STORIES ── */
        .minor-stories-container {
            border-top: 1px dashed var(--ink);
            padding-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .story-minor {
            padding: 6px 0;
            border-bottom: 1px dotted #999;
        }
        .story-minor:last-child { border-bottom: none; padding-bottom: 0; }
        .story-minor h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 3px;
        }
        .story-minor p {
            font-size: 0.78rem;
            line-height: 1.45;
            text-align: justify;
            hyphens: auto;
        }

        /* ── CREDITS & PHOTO ── */
        .source-credit {
            font-size: 0.67rem !important;
            font-style: italic;
            text-align: right !important;
            color: #444;
            margin-top: 4px;
        }
        .news-photo {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.35) brightness(0.9) sepia(25%);
            mix-blend-mode: multiply;
            border: 2px double var(--ink);
            display: block;
        }

        @media print {
            body { background: var(--paper); padding: 0;
                    -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .newspaper-container { box-shadow: none; max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="newspaper-container">
    <header>
        <h1 class="masthead">The Neo News</h1>
        <div class="tagline">"Keeping You Informed the Old-Fashioned Way"</div>
        <div class="meta-bar">
            <span>VOL. CXXIV · No. 42,110</span>
            <span>THURSDAY, MAY 21, 2026</span>
            <span>PRICE 25 CENTS</span>
        </div>
    </header>
    <main class="front-page-columns">
        
    </main>
</div>
</body>
</html>
